<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SE1 VMC Tracker</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; font-size: 11px; overflow: hidden; }
        #v-container { width: 100%; height: 35vh; background: #222; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #111; }
        input, button, select { background: #333; color: #fff; border: 1px solid #555; padding: 12px; border-radius: 4px; font-size: 12px; }
        #status { grid-column: span 2; color: #0f0; font-weight: bold; min-height: 1.2em; padding: 5px 0; }
        .full { grid-column: span 2; }
    </style>
</head>
<body>
    <div id="v-container"><video id="webcam" autoplay playsinline muted></video></div>
    <div id="controls">
        <div id="status">상태: 시스템 대기 중...</div>
        <input type="text" id="ip" placeholder="PC IP (예: 192.168.0.5)">
        <button id="connectBtn">1. 서버 연결</button>
        <select id="res">
            <option value="160">160px (SE1 최적)</option>
            <option value="320" selected>320px</option>
        </select>
        <select id="fps">
            <option value="15">15 FPS</option>
            <option value="24">24 FPS</option>
            <option value="30" selected>30 FPS</option>
        </select>
        <label style="display:flex; align-items:center;"><input type="checkbox" id="eyeTrack"> 눈동자 추적</label>
        <button id="startBtn" class="full">2. 트래킹 시작</button>
    </div>

<script>
    var faceLandmarker;
    var video = document.getElementById("webcam");
    var statusTxt = document.getElementById("status");
    var ws;
    var lastVideoTime = -1;

    // 라이브러리 모듈 동적 로드 (확장자 및 문법 오류 해결)
    function loadLibrary() {
        statusTxt.innerText = "상태: 라이브러리 로딩 중...";
        import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/vision_bundle.mjs')
            .then(function(mod) {
                window.tasksVision = mod;
                statusTxt.innerText = "상태: 라이브러리 로드 성공! 모델 준비...";
                initModels();
            })
            .catch(function(err) {
                statusTxt.innerText = "상태: 로드 실패 - " + err.message;
            });
    }

    function initModels() {
        var vision = window.tasksVision;
        // 주소 잘림 방지를 위한 결합 방식
        var wPath = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm";
        var mPath = "https://googleapis.com/mediapipe-assets/face_landmarker.task";

        vision.FilesetResolver.forVisionTasks(wPath)
            .then(function(fileset) {
                return vision.FaceLandmarker.createFromOptions(fileset, {
                    baseOptions: { modelAssetPath: mPath, delegate: "GPU" },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
            })
            .then(function(landmarker) {
                faceLandmarker = landmarker;
                statusTxt.innerText = "상태: 모든 준비 완료!";
            })
            .catch(function(err) {
                statusTxt.innerText = "상태: 모델 초기화 에러 - " + err.message;
            });
    }

    // 서버 연결 (VmcRelay.exe와 통신)
    document.getElementById("connectBtn").onclick = function() {
        var ip = document.getElementById("ip").value;
        if(!ip) return alert("PC IP를 입력하세요");
        statusTxt.innerText = "상태: 서버 연결 시도...";
        ws = new WebSocket("ws://" + ip + ":8080");
        ws.binaryType = "arraybuffer";
        ws.onopen = function() { statusTxt.innerText = "상태: 서버 연결 성공!"; };
        ws.onerror = function() { statusTxt.innerText = "상태: 연결 실패 (IP 확인)"; };
    };

    // 트래킹 시작
    document.getElementById("startBtn").onclick = function() {
        if(!faceLandmarker) return alert("로딩 중입니다.");
        navigator.mediaDevices.getUserMedia({
            video: { 
                width: parseInt(document.getElementById("res").value), 
                frameRate: parseInt(document.getElementById("fps").value),
                facingMode: "user" 
            }
        }).then(function(stream) {
            video.srcObject = stream;
            video.onloadeddata = function() { predict(); };
            document.getElementById("startBtn").style.display = "none";
        }).catch(function(e) { alert("카메라 에러: " + e.message); });
    };

    function predict() {
        if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            try {
                var result = faceLandmarker.detectForVideo(video, performance.now());
                if (result.faceBlendshapes && result.faceBlendshapes.length > 0 && ws && ws.readyState === 1) {
                    var shapes = result.faceBlendshapes[0].categories;
                    var useEye = document.getElementById("eyeTrack").checked;
                    for (var i = 0; i < shapes.length; i++) {
                        var s = shapes[i];
                        if (!useEye && s.categoryName.indexOf("EyeLook") !== -1) continue;
                        ws.send(createVmcPacket(s.categoryName, s.score));
                    }
                    // VMC OK 패킷
                    var ok = new Uint8Array([47,86,77,67,47,69,120,116,47,79,107,0,0,0,0,0,44,105,0,0,0,0,0,1]);
                    ws.send(ok);
                }
            } catch (e) {}
        }
        requestAnimationFrame(predict);
    }

    function createVmcPacket(name, value) {
        var address = "/VMC/Ext/Blend/Val\0\0\0";
        var tag = ",sf\0";
        var namePadded = name + "\0".repeat(4 - (name.length % 4 || 4));
        var buf = new ArrayBuffer(address.length + tag.length + namePadded.length + 4);
        var view = new DataView(buf);
        var offset = 0;
        for (var i = 0; i < address.length; i++) view.setUint8(offset++, address.charCodeAt(i));
        for (var i = 0; i < tag.length; i++) view.setUint8(offset++, tag.charCodeAt(i));
        for (var i = 0; i < namePadded.length; i++) view.setUint8(offset++, namePadded.charCodeAt(i));
        view.setFloat32(offset, value, false);
        return buf;
    }

    window.onload = function() { setTimeout(loadLibrary, 1000); };
</script>
</body>
</html>
