<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>SE1 Tracker</title>
    <!-- jsdelivr 대신 unpkg 서버를 시도해 봅니다. 주소 끝까지 확인 필수! -->
    <script src="vision_bundle.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; font-size: 11px; }
        #status { color: #0f0; font-weight: bold; padding: 15px; background: #111; border-bottom: 1px solid #333; }
        #controls { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        input, button, select { background: #333; color: #fff; border: 1px solid #555; padding: 15px; border-radius: 4px; font-size: 14px; }
        .full { grid-column: span 2; }
    </style>
</head>
<body>
    <div id="status">상태: 라이브러리 찾는 중...</div>
    <div id="controls">
        <input type="text" id="ip" placeholder="PC IP 입력" class="full">
        <button id="connectBtn">1. 서버 연결</button>
        <button id="startBtn">2. 트래킹 시작</button>
    </div>
    <video id="webcam" autoplay playsinline muted style="width:100%; height:auto; background:#222;"></video>

<script>
    var statusTxt = document.getElementById("status");
    var faceLandmarker;
    var ws;

    // 라이브러리 인식 루프 (인식될 때까지 0.5초마다 확인)
    function checkLibrary() {
        if (window.tasksVision) {
            statusTxt.innerText = "상태: 라이브러리 인식 성공! 모델 로딩 중...";
            initModel();
        } else {
            statusTxt.innerText = "상태: 라이브러리 대기 중... (잠시만 기다리세요)";
            setTimeout(checkLibrary, 500);
        }
    }

    function initModel() {
        var vision = window.tasksVision;
        // 주소 끝이 /wasm 인지 확인
        vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.34/wasm")
            .then(function(fileset) {
                return vision.FaceLandmarker.createFromOptions(fileset, {
                    baseOptions: { 
                        modelAssetPath: "https://googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU" 
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO"
                });
            })
            .then(function(landmarker) {
                faceLandmarker = landmarker;
                statusTxt.innerText = "상태: 모든 준비 완료!";
            })
            .catch(function(err) {
                statusTxt.innerText = "상태: 오류 - " + err.message;
            });
    }

    // 서버 연결 및 카메라 로직은 이전과 동일하되, 에러 체크 강화
    document.getElementById("connectBtn").onclick = function() {
        var ip = document.getElementById("ip").value;
        if (!ip) return alert("IP를 입력하세요");
        ws = new WebSocket("ws://" + ip + ":8080");
        ws.onopen = function() { statusTxt.innerText = "상태: 서버 연결 성공!"; };
        ws.onerror = function() { statusTxt.innerText = "상태: 연결 실패 (IP 확인)"; };
    };

    document.getElementById("startBtn").onclick = function() {
        if (!faceLandmarker) return alert("로딩 중입니다.");
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(function(stream) {
                document.getElementById("webcam").srcObject = stream;
                statusTxt.innerText = "상태: 트래킹 가동 중!";
                // 트래킹 실행 루프 호출 (생략된 predict 함수 부분)
            });
    };

    window.onload = checkLibrary;
</script>
</body>
</html>
